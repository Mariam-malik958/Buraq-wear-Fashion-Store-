// URL se product ki id nikalo
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
const currentProduct = allProducts[productId];

// Agar product mil jaye to page pe show karo
if(currentProduct) {
  document.getElementById('main-img').src = currentProduct.img; // Wahi image
  document.getElementById('brand-name').innerText = currentProduct.brand;
  document.getElementById('product-name').innerText = currentProduct.name;
  document.getElementById('product-price').innerText = "Rs. " + currentProduct.price;
  document.getElementById('product-desc').innerText = currentProduct.desc;
  document.title = currentProduct.name + " - Buraq Wear";
} else {
  document.getElementById('product-name').innerText = "Product Not Found";
}

// Size select karne ka code
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

// Order Now button
document.querySelector('.order-now-btn').addEventListener('click', function() {
  const selectedSize = document.querySelector('.size-btn.active');
  if(!selectedSize) {
    alert("Please select a size first!");
    return;
  }
  alert(`Order placed for ${currentProduct.name} - Size: ${selectedSize.innerText}`);
